# Neo4j for FIDES Grow trust graph (and future Shield graph features).
# Start: docker compose up neo4j -d
# Browser: http://localhost:7474 (neo4j / see NEO4J_PASSWORD in .env)
services:
  neo4j:
    image: neo4j:5.26-community
    container_name: fides-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-fides-dev-password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  neo4j_data:
